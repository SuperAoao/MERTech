# FPT + dedicated PN head (local conv + pluck gate) + combined checkpoint
experiment_id: fpt_pn_head
seed: 42
dataset: Guzheng_Tech99

model:
  url: m-a-p/MERT-v1-95M
  freeze_all: false
  use_fpt: true
  fpt_levels: 3
  fpt_num_layers: 1
  fpt_num_heads: 8
  fpt_dropout: 0.1
  use_pn_head: true
  pn_head_context: 5
  pn_head_hidden: 256
  pn_head_dropout: 0.2
  pn_head_use_pluck_gate: true
  pn_head_use_onset_gate: false
  pn_fusion_alpha: 0.7

training:
  lr: 1.0e-3
  max_epochs: 10000
  batch_size: 10
  validation_interval: 5
  save_interval: 100
  early_stopping: 1000
  enable_early_stopping: true
  best_checkpoint_metric: combined

loss:
  pitch_weight: 0.5
  onset_weight: 1.0
  pn_head_weight: 2.0
  pn_head_pos_weight: 5.0

eval:
  onset_threshold: 0.5
  frame_threshold: 0.5
  onset_tolerance: 0.05
  event_gap_seconds: 1.0
  threshold_sweep_every_epoch: true
  failure_inspection: true
  failure_focus_classes: [5, 6]

runtime:
  cuda_device: "0"
  use_visdom: false
